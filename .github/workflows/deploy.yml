name: Deploy

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run build
      - run: bun run generate:og
      - name: Deploy to production
        if: github.event_name == 'push'
        run: bunx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      - name: Upload preview version
        if: github.event_name == 'pull_request'
        run: |
          bunx wrangler versions upload 2>&1 | tee version-upload.log
          PREVIEW_URL="$(grep -Eo 'https://[a-z0-9-]+\.[a-z0-9-]+\.workers\.dev' version-upload.log | head -1)"
          echo "PREVIEW_URL=$PREVIEW_URL" >> "$GITHUB_ENV"
          {
            echo "### Preview"
            echo "${PREVIEW_URL:-_No preview URL was generated for this version._}"
          } >> "$GITHUB_STEP_SUMMARY"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      - name: Comment preview on pull request
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          MARKER='<!-- deploy-preview -->'
          printf '%s\n\n### Preview\n\n%s\n\nBuilt from %s.\n' \
            "$MARKER" \
            "${PREVIEW_URL:-_No preview URL was generated for this version._}" \
            "$HEAD_SHA" > comment-body.md
          COMMENT_ID="$(gh api "repos/${{ github.repository }}/issues/$PR_NUMBER/comments" --paginate \
            --jq "[.[] | select(.body | startswith(\"$MARKER\"))][0].id // empty")"
          if [ -n "$COMMENT_ID" ]; then
            gh api --method PATCH "repos/${{ github.repository }}/issues/comments/$COMMENT_ID" -F body=@comment-body.md > /dev/null
          else
            gh api --method POST "repos/${{ github.repository }}/issues/$PR_NUMBER/comments" -F body=@comment-body.md > /dev/null
          fi
